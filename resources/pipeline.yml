      continuous: false
      channel: "CURRENT"
      photon: true
      serverless: true

      libraries:
        - notebook:
            path: ./notebooks/raw_dlt_junction_bloodwork.py

      configuration:
        catalog: "${var.catalog}"
        schema: "raw_junction_bloodwork"
        volume_name: "${var.volume_name}"
        env: "${var.env}"

      tags:
        tenant: "ch"
