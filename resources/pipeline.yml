      schema: "lzn_junction_bloodwork"
      development: false
      continuous: false
      channel: "CURRENT"
      photon: true
      serverless: true

      libraries:
        - notebook:
            path: ./notebooks/lzn_dlt_junction_bloodwork.py

      configuration:
        catalog: "${var.catalog}"
