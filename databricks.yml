bundle:
  name: junction-bloodwork-test

resources:
  pipelines:
    lzn_junction_bloodwork:
      name: "ch-lzn-dlt-pipeline-junction-bloodwork1-${var.env}"
      catalog: "${var.catalog}"
      schema: "lzn_junction_bloodwork"
      development: false
      continuous: false
      channel: "CURRENT"
      photon: true
      serverless: true

      libraries:
        - notebook:
            path: ./notebooks/lzn_dlt_junction_bloodwork.py

      configuration:
        catalog: "${var.catalog}"
        schema: "lzn_junction_bloodwork"
        volume_name: "${var.volume_name}"
        env: "${var.env}"
        source_folder: "vol_junction_bloodwork"

      tags:
        tenant: "ch"

    raw_junction_bloodwork:
      name: "ch-raw-dlt-pipeline-junction-bloodwork1-${var.env}"
      catalog: "${var.catalog}"
      schema: "raw_junction_bloodwork"
      development: false
      continuous: false
      channel: "CURRENT"
      photon: true
      serverless: true

      libraries:
        - notebook:
            path: ./notebooks/raw_dlt_junction_bloodwork.py

      configuration:
        catalog: "${var.catalog}"
        schema: "raw_junction_bloodwork"
        volume_name: "${var.volume_name}"
        env: "${var.env}"

      tags:
        tenant: "ch"

variables:
  catalog:
    description: Catalog name
  volume_name:
    description: Volume name
  env:
    description: Deployment environment

targets:
  dev:
    default: true
    variables:
      catalog: dev_cascaid
      volume_name: lzn_junction_bloodwork
      env: dev
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - group_name: users
        level: CAN_MANAGE
    run_as:
      service_principal_name: f49fbce6-f420-466e-a5a7-5faa29b4eb03
      #service_principal_name: 2e829c9a-1240-4277-9040-40a6f1970a3b
      #service_principal_name: 1496f6cd-02ef-4c5e-ad0a-402c03bbaf00
      #service_principal_name: sp_dev_cascaid_github_deploy
      

  test:
    variables:
      catalog: test_cascaid
      volume_name: lzn_junction_bloodwork
      env: test
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - group_name: users
        level: CAN_MANAGE

  prod:
    variables:
      catalog: prod_cascaid
      volume_name: lzn_junction_bloodwork
      env: prod
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: sp_prod_ch_xfrm
