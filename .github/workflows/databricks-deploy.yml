name: Databricks Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Bundle target"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod
      pipeline_name:
        description: "Pipeline resource to run"
        required: true
        default: "lzn_junction_bloodwork"
        type: choice
        options:
          - lzn_junction_bloodwork
          - raw_junction_bloodwork

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Show Databricks CLI version
        run: databricks -v

      - name: Validate bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate -t ${{ github.event.inputs.target }}

      - name: Deploy bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy -t ${{ github.event.inputs.target }}

      - name: Run pipeline
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle run -t ${{ github.event.inputs.target }} ${{ github.event.inputs.pipeline_name }}